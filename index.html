<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Convention Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

    <header>
        <div class="logo-circle">LOGO</div>
        <h1 style="margin:0">LIVING BY DESIGN NATION</h1>
        <h2 style="color:#2563eb; margin:5px 0">National Convention Registration</h2>
        <p style="color:#6b7280; font-style:italic">Please Register to secure a seat</p>
        <div id="dateDisp" style="position:absolute; bottom:10px; right:20px; font-size:12px; color:#9ca3af"></div>
    </header>

    <main style="max-width:500px; margin:auto; padding:20px">
        <div id="formContainer" class="form-box">
            <form id="regForm">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <div class="grid-2">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="tel" id="phone" placeholder="Phone Number" required>
                </div>
                <select id="colony" required>
                    <option value="">-- Select Colony --</option>
                    <option>Partnership</option><option>Apprenticeship</option>
                    <option>Relationship</option><option>Citizenship</option>
                    <option>Entrepreneurship</option><option>Leadership</option>
                    <option>Stewardship</option>
                </select>
                <div class="grid-2">
                    <select id="hub" required></select>
                    <select id="tribe" required></select>
                </div>
                <button type="submit" class="btn-pay">PAY TO REGISTER</button>
            </form>
        </div>

        <div id="loadingScreen" class="hidden" style="text-align:center; padding:40px">
            <div class="loader"></div>
            <p>Confirming Registration...</p>
        </div>

        <div id="successCard" class="hidden ticket-card">
            <h2 style="color:#059669">Registration Confirmed!</h2>
            <p>Please present this at the entrance</p>
            <div class="id-display">
                <p style="font-size:10px; color:#9ca3af">UNIQUE ID</p>
                <div id="displayID" style="font-size:24px; font-weight:bold; margin-bottom:10px"></div>
                <svg id="barcode"></svg>
            </div>
            <button onclick="window.print()" class="print-btn">PRINT THIS TICKET</button>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzA--mA4W4HYHsFDXszrltwU5bgGBa-YWl5R6McyafxaNFDbBQwT65DrRdtML0odkHI/exec";
        const PAYSTACK_KEY = "pk_test_91f991c422aa16b731c14cfac90911e582c23544";

        document.getElementById('dateDisp').innerText = new Date().toDateString();

        const h = document.getElementById('hub');
        for(let i=1;i<=31;i++){ h.options.add(new Option(`Hub ${i}`, i)); }
        const t = document.getElementById('tribe');
        for(let i=1;i<=72;i++){ t.options.add(new Option(`Tribe ${i}`, i)); }

        document.getElementById('regForm').onsubmit = function(e){
            e.preventDefault();
            let handler = PaystackPop.setup({
                key: PAYSTACK_KEY,
                email: document.getElementById('email').value,
                amount: 500000, 
                callback: function(response){ finalize(response.reference); }
            });
            handler.openIframe();
        };

        async function finalize(ref) {
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');

            const payload = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                colony: document.getElementById('colony').value,
                hub: document.getElementById('hub').value,
                tribe: document.getElementById('tribe').value,
                paymentRef: ref
            };

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            setTimeout(async () => {
                const res = await fetch(`${SCRIPT_URL}?getRealID=${ref}`);
                const result = await res.json();
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('successCard').classList.remove('hidden');
                document.getElementById('displayID').innerText = result.uniqueID;
                JsBarcode("#barcode", result.uniqueID, { format: "CODE128", width: 2, height: 50, displayValue: false });
            }, 3000);
        }
    </script>
</body>
</html>
