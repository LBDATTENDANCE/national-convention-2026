<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Convention Registration</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

    <header>
        <div class="logo-circle">LOGO</div>
        <h1>LIVING BY DESIGN NATION</h1>
        <h2 style="color: #2563eb; font-weight: 600;">National Convention Registration</h2>
        <p style="color: #6b7280; font-style: italic;">Please Register to secure a seat</p>
        <div id="dateDisp" style="position: absolute; bottom: 8px; right: 16px; font-size: 0.75rem; color: #9ca3af; font-family: monospace;"></div>
    </header>

    <main style="max-width: 32rem; margin: 0 auto; padding: 1rem;">
        
        <div id="formContainer" class="form-box">
            <form id="regForm" class="space-y-4">
                <input type="text" id="fullName" placeholder="Full Name" required>
                
                <div class="grid-2">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="tel" id="phone" placeholder="Phone" required>
                </div>
                
                <select id="colony" required>
                    <option value="">-- Select Colony --</option>
                    <option>Partnership</option>
                    <option>Apprenticeship</option>
                    <option>Relationship</option>
                    <option>Citizenship</option>
                    <option>Entrepreneurship</option>
                    <option>Leadership</option>
                    <option>Stewardship</option>
                </select>
                
                <div class="grid-2">
                    <select id="hub" required></select>
                    <select id="tribe" required></select>
                </div>
                
                <button type="submit" class="btn-pay">PAY TO REGISTER</button>
            </form>
        </div>

        <div id="loadingScreen" class="hidden" style="text-align: center; padding: 2.5rem;">
            <div class="loader" style="border-radius: 50%; border: 4px solid #f3f3f3; height: 3rem; width: 3rem; margin: 0 auto 1rem auto;"></div>
            <p>Processing Payment & Generating Ticket...</p>
        </div>

        <div id="successCard" class="hidden ticket-card">
            <h2 style="color: #059669; font-weight: bold; font-size: 1.5rem;">Registration Confirmed!</h2>
            <p style="color: #6b7280; margin-bottom: 1.5rem;">Screenshot this for Convention Entry</p>
            
            <div class="id-display">
                <p style="font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em;">Your Unique ID</p>
                <div id="displayID" style="font-size: 1.5rem; font-family: monospace; font-weight: bold; color: #1f2937; margin-bottom: 1rem;">---</div>
                <svg id="barcode" style="margin: 0 auto;"></svg>
            </div>
            
            <button onclick="location.reload()" style="margin-top: 2rem; color: #3b82f6; font-size: 0.875rem; background: none; border: none; cursor: pointer;">Register Another Person</button>
        </div>
    </main>

    <script>
        // --- JAVASCRIPT REMAINS THE SAME AS BEFORE ---
        const SCRIPT_URL = "YOUR_WEB_APP_URL";
        const PAYSTACK_KEY = "pk_test_YOUR_KEY";

        document.getElementById('dateDisp').innerText = new Date().toDateString();

        const hSelect = document.getElementById('hub');
        for(let i=1; i<=31; i++){ hSelect.options.add(new Option(`Hub ${i}`, i)); }
        const tSelect = document.getElementById('tribe');
        for(let i=1; i<=72; i++){ tSelect.options.add(new Option(`Tribe ${i}`, i)); }

        document.getElementById('regForm').onsubmit = function(e){
            e.preventDefault();
            let handler = PaystackPop.setup({
                key: PAYSTACK_KEY,
                email: document.getElementById('email').value,
                amount: 500000, 
                callback: function(response){
                    finalizeRegistration(response.reference);
                }
            });
            handler.openIframe();
        };

        async function finalizeRegistration(ref) {
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');

            const payload = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                colony: document.getElementById('colony').value,
                hub: document.getElementById('hub').value,
                tribe: document.getElementById('tribe').value,
                paymentRef: ref
            };

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            setTimeout(async () => {
                const res = await fetch(`${SCRIPT_URL}?getRealID=${ref}`);
                const result = await res.json();
                
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('successCard').classList.remove('hidden');
                document.getElementById('displayID').innerText = result.uniqueID;
                
                JsBarcode("#barcode", result.uniqueID, { format: "CODE128", width: 2, height: 60, displayValue: false });
            }, 3000);
        }
    </script>
</body>
</html>
